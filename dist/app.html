<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backrooms</title>
    <script type="module" crossorigin src="./assets/app-Bv43VFRN.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/app-CChF3_ua.css">
  </head>
  <body>
    <main id="app" aria-label="Backrooms 3D scene">
      <canvas id="scene"></canvas>
      <div class="static-layer" aria-hidden="true"></div>
      <div class="vignette" aria-hidden="true"></div>

      <header class="hud hud--top" hidden>
        <div class="signal">
          <select id="level-select" class="level-select" aria-label="Level">
            <option value="0">LEVEL 0</option>
            <option value="1">LEVEL 1</option>
            <option value="2">LEVEL 2</option>
            <option value="3">LEVEL 3</option>
          </select>
          <span id="status-text">NO SIGNAL</span>
          <select id="language-select" class="language-select" aria-label="Language">
            <option value="zh-CN">简体中文</option>
            <option value="en">English</option>
          </select>
        </div>
        <div class="hud-stack">
          <div class="meters" aria-live="polite">
            <span id="distance-readout">0m</span>
            <span id="light-readout">HUM</span>
            <span id="fps-readout">-- FPS</span>
          </div>
          <div class="stamina-meter" aria-label="Stamina">
            <span class="stamina-meter__label">STAMINA</span>
            <div class="stamina-meter__track">
              <div id="stamina-fill" class="stamina-meter__fill"></div>
            </div>
            <span id="stamina-readout">150/150</span>
          </div>
          <div id="flashlight-meter" class="flashlight-meter" aria-label="Flashlight battery" hidden>
            <span class="flashlight-meter__label">LIGHT</span>
            <div class="flashlight-meter__track">
              <div id="flashlight-fill" class="flashlight-meter__fill"></div>
            </div>
            <span id="flashlight-readout">--</span>
          </div>
          <div id="detector-meter" class="detector-meter" aria-label="Entity detector" hidden>
            <span class="detector-meter__label">SCAN</span>
            <div class="detector-meter__track">
              <div id="detector-fill" class="detector-meter__fill"></div>
            </div>
            <span id="detector-readout">--</span>
          </div>
          <div id="buff-list" class="buff-list" aria-live="polite" hidden></div>
        </div>
      </header>

      <div class="reticle" aria-hidden="true"></div>
      <div id="entity-markers" class="entity-markers" aria-hidden="true"></div>
      <div id="item-info" class="item-info" aria-live="polite" hidden>
        <span id="item-info-name">ALMOND WATER</span>
        <strong id="item-info-effect">+50 STAMINA BOOST</strong>
        <small id="item-info-action">F / BUTTON PICK UP</small>
      </div>
      <div id="loading-overlay" class="loading-overlay" aria-live="polite" hidden>
        <div class="loading-overlay__panel">
          <span>LEVEL 0</span>
          <strong id="loading-status">NOCLIP SYNC</strong>
          <div class="loading-overlay__track">
            <div id="loading-fill"></div>
          </div>
        </div>
      </div>
      <div id="exit-overlay" class="exit-overlay" aria-live="polite" hidden>
        <strong>EXIT STABILIZED</strong>
        <span>LEVEL 0 SIGNAL LOST</span>
      </div>

      <div id="joystick" class="joystick" aria-label="Move" hidden>
        <div class="joystick__knob"></div>
      </div>
      <button id="jump-button" class="jump-button" type="button" aria-label="Jump" hidden>
        <span></span>
      </button>
      <button id="use-button" class="use-button" type="button" aria-label="Pick up" hidden>
        <span>F</span>
      </button>
      <button id="flashlight-button" class="flashlight-button" type="button" aria-label="Toggle flashlight" hidden>
        <span></span>
      </button>
      <button id="detector-button" class="detector-button" type="button" aria-label="Use detector" hidden>
        <span></span>
      </button>
    </main>
  </body>
</html>
