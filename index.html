<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backrooms</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #070805;
        color: #e9edc7;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      a {
        color: #86ff9f;
      }
    </style>
  </head>
  <body>
    <a id="backrooms-link" href="./backrooms.html">进入 Backrooms</a>
    <script>
      const gameUrl = new URL("./backrooms.html", window.location.href);
      const versionUrl = new URL("./backrooms-version.json", window.location.href);

      fetch(versionUrl, { cache: "no-store" })
        .then((response) => (response.ok ? response.json() : null))
        .then((manifest) => {
          if (manifest?.buildId) gameUrl.searchParams.set("v", manifest.buildId);
        })
        .catch(() => {
          // The single-file distribution intentionally works without a manifest.
        })
        .finally(() => {
          document.querySelector("#backrooms-link").href = gameUrl.href;
          window.location.replace(gameUrl.href);
        });
    </script>
  </body>
</html>
